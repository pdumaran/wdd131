<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtered Temple Album - W04 Assignment</title>
    <meta name="description"
        content="A responsive filtered temple picture album featuring lazy loading, dynamic DOM manipulation, and functional JS array filters.">
    <meta name="author" content="Pierre Phil D. Bangay">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Acme&family=Roboto:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Acme&family=Roboto:wght@400;700&display=swap"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Acme&family=Roboto:wght@400;700&display=swap">
    </noscript>

    <!-- CSS Links -->
    <link rel="stylesheet" href="styles/filtered-temples.css">
    <link rel="stylesheet" href="styles/filtered-temples-large.css" media="(min-width: 740px)">

    <!-- JavaScript Link -->
    <script src="scripts/filtered-temples.js" defer></script>
</head>

<body>
    <header>
        <h1>Temple Album</h1>
        <button type="button" id="menu" aria-label="Toggle Navigation Menu"></button>
        <nav>
            <ul class="navigation">
                <li><a href="#" id="home" class="active">Home</a></li>
                <li><a href="#" id="old">Old</a></li>
                <li><a href="#" id="new">New</a></li>
                <li><a href="#" id="large">Large</a></li>
                <li><a href="#" id="small">Small</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 id="gallery-title">Home</h2>
        <!-- Dynamically rendered by filtered-temples.js -->
        <div class="gallery-grid" id="gallery-grid"></div>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Pierre Phil D. Bangay | Western Visayas, Philippines</p>
        <p id="lastModified" class="highlight"></p>
    </footer>
</body>

</html>
