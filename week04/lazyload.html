<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W04 Activity: Native Browser Lazy Loading</title>
    <meta name="description"
        content="Demonstration of native browser-level image lazy loading for performance optimization.">
    <meta name="author" content="Pierre Phil D. Bangay">

    <!-- Link External Stylesheet -->
    <link rel="stylesheet" href="styles/lazyload.css">

    <!-- Link External Script with defer -->
    <script src="scripts/lazyload.js" defer></script>
</head>

<body>
    <header>
        <h1>Lazy Loading Demonstration</h1>
    </header>

    <main>
        <!-- Requirement 5 & 7 - Six portrait images with lazy loading [Activity Instructions #5, #7, #9] -->
        <picture>
            <img src="images/placeholder.webp" data-src="images/photo1.webp" alt="Scenic mountain landscape with a lake"
                loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="images/placeholder.webp" data-src="images/photo2.webp" alt="Close-up of a vibrant sunflower"
                loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="images/placeholder.webp" data-src="images/photo3.webp" alt="Rustic wooden bridge in a forest"
                loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="images/placeholder.webp" data-src="images/photo4.webp" alt="City skyline at sunset" loading="lazy"
                width="400" height="600">
        </picture>
        <picture>
            <img src="images/placeholder.webp" data-src="images/photo5.webp" alt="Waves crashing on a rocky shore"
                loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="images/placeholder.webp" data-src="images/photo6.webp" alt="Ancient stone castle ruins"
                loading="lazy" width="400" height="600">
        </picture>
    </main>

    <footer>
        <p>&copy;<span id="current-year"></span> | Pierre Phil D. Bangay | WDD 131 Learning Activity</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>

</html>
